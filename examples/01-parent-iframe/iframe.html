<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>iframe receiver</title></head>
<body>
<script type="module">
import {
  createChannel,
  createMessagePortEndpoint,
  createLowLevelStream,
} from "iframebuffer";

let received = 0;
const TOTAL = 1024 * 1024; // 1 MB

window.addEventListener("message", (ev) => {
  if (ev.data?.type !== "PORT") return;
  const port = ev.ports[0];
  const ch = createChannel(createMessagePortEndpoint(port));

  ch.onStream(({ session }) => {
    session.onChunk((chunk) => {
      received += (chunk instanceof ArrayBuffer) ? chunk.byteLength : 0;
    });
    session.onClose?.(() => {
      window.parent.postMessage({ type: "DONE", received }, "*");
    });
  });
});
</script>
</body>
</html>
