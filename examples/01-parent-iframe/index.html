<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>01 — Parent ↔ Iframe</title>
  <style>
    body { font-family: sans-serif; padding: 2rem; }
    progress { width: 300px; }
    #status { margin-top: 1rem; }
  </style>
</head>
<body>

  <iframe id="child" src="./iframe.html" style="display:none" title="receiver"></iframe>
  <script type="module" src="./main.ts"></script>
</body>
</html>
