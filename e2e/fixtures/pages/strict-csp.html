<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>strict-csp</title></head>
<body>
<!--
  This page is served with a strict Content-Security-Policy header:
    default-src 'self'; script-src 'self'
  No unsafe-eval, no wasm-unsafe-eval.

  The library (/dist/index.js) is loaded via script-src 'self' from the same origin.
  This test verifies the library baseline path is eval-free (CSP-safe).

  Communication: parent ↔ iframe using MessageChannel (MessagePort-based).
  No createWindowEndpoint needed — MessagePorts are origin-agnostic.
-->
<iframe id="consumer" src="/sandbox-inner.html"
        sandbox="allow-scripts allow-same-origin"
        title="strict-csp consumer iframe"
        style="display:none"></iframe>
<script type="module">
import {
  createChannel,
  createLowLevelStream,
  createMessagePortEndpoint,
} from "/dist/index.js";

const CHUNK_SIZE = 64 * 1024; // 64 KB
const TOTAL = 1024 * 1024;    // 1 MB
const NUM_CHUNKS = TOTAL / CHUNK_SIZE;

const iframe = document.getElementById("consumer");

iframe.addEventListener("load", async () => {
  const mc = new MessageChannel();
  iframe.contentWindow.postMessage({ type: "PORT" }, "*", [mc.port2]);

  const endpoint = createMessagePortEndpoint(mc.port1);
  const ch = createChannel(endpoint, { channelId: "sandbox-inner" });

  await ch.capabilityReady;

  const stream = createLowLevelStream(ch);
  // Wait for iframe OPEN/OPEN_ACK handshake
  await new Promise(r => setTimeout(r, 50));

  for (let i = 0; i < NUM_CHUNKS; i++) {
    const buf = new ArrayBuffer(CHUNK_SIZE);
    new Uint8Array(buf).fill(i & 0xff);
    await stream.send(buf, [buf]);
  }
  stream.close();
});

// Listen for ACK from iframe
window.addEventListener("message", (ev) => {
  if (ev.data?.type === "ACK" && ev.data.received >= TOTAL) {
    console.log("DONE");
  }
});
</script>
</body>
</html>
