<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>three-hop</title></head>
<body>
<iframe id="consumer" src="/sandbox-inner.html"
        sandbox="allow-scripts allow-same-origin"
        title="stream consumer iframe"
        style="display:none"></iframe>
<script type="module">
import {
  createChannel,
  createLowLevelStream,
  createMessagePortEndpoint,
  createRelayBridge,
} from "/dist/index.js";

const CHUNK_SIZE = 64 * 1024; // 64 KB
const TOTAL = 1024 * 1024;    // 1 MB
const NUM_CHUNKS = TOTAL / CHUNK_SIZE;

// Worker produces a stream once told to start
const libUrl = new URL("/dist/index.js", window.location.href).href;

const workerCode = `
self.onmessage = async (ev) => {
  if (ev.data?.type === "SETUP") {
    const { libUrl } = ev.data;
    const { createChannel, createLowLevelStream, createMessagePortEndpoint } = await import(libUrl);
    const mc = new MessageChannel();
    // Send port1 to main so main can attach the upstream channel
    self.postMessage({ type: "UPSTREAM_PORT" }, [mc.port1]);

    const endpointW = createMessagePortEndpoint(mc.port2);
    const chW = createChannel(endpointW, { channelId: "upstream" });
    await chW.capabilityReady;

    // Wait for main to confirm relay is ready before sending
    await new Promise(r => {
      self.addEventListener("message", function onGo(e) {
        if (e.data?.type === "GO") { self.removeEventListener("message", onGo); r(); }
      });
    });

    const stream = createLowLevelStream(chW);
    // Brief pause for OPEN/OPEN_ACK handshake
    await new Promise(r => setTimeout(r, 50));

    const N = ${NUM_CHUNKS};
    const CS = ${CHUNK_SIZE};
    for (let i = 0; i < N; i++) {
      const buf = new ArrayBuffer(CS);
      new Uint8Array(buf).fill(i & 0xff);
      await stream.send(buf, [buf]);
    }
    stream.close();
  }
};
`;

const blob = new Blob([workerCode], { type: "application/javascript" });
const workerUrl = URL.createObjectURL(blob);
const worker = new Worker(workerUrl, { type: "module" });

const iframe = document.getElementById("consumer");

async function setup() {
  // 1. Set up downstream channel (main → iframe)
  const downMC = new MessageChannel();
  iframe.contentWindow.postMessage({ type: "PORT" }, "*", [downMC.port2]);

  const downEndpoint = createMessagePortEndpoint(downMC.port1);
  const downChannel = createChannel(downEndpoint, { channelId: "sandbox-inner" });
  await downChannel.capabilityReady;

  // 2. Tell worker to set up — it will reply with its upstream port
  worker.postMessage({ type: "SETUP", libUrl });

  // 3. Wait for worker to hand us the upstream port
  const upPort = await new Promise((resolve) => {
    worker.addEventListener("message", function onPort(ev) {
      if (ev.data?.type === "UPSTREAM_PORT") {
        worker.removeEventListener("message", onPort);
        resolve(ev.ports[0]);
      }
    });
  });

  // 4. Set up upstream channel (main receives from worker)
  const upEndpoint = createMessagePortEndpoint(upPort);
  const upChannel = createChannel(upEndpoint, { channelId: "upstream" });
  await upChannel.capabilityReady;

  // 5. Wire relay bridge: worker ← upChannel ← relay → downChannel → iframe
  createRelayBridge(upChannel, downChannel);

  // 6. Tell worker to start sending
  worker.postMessage({ type: "GO" });
}

iframe.addEventListener("load", () => {
  setup().catch(console.error);
});

// Listen for ACK from iframe
window.addEventListener("message", (ev) => {
  if (ev.data?.type === "ACK" && ev.data.received >= TOTAL) {
    console.log("DONE");
    URL.revokeObjectURL(workerUrl);
  }
});
</script>
</body>
</html>
